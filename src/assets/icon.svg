<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="23" fill="#f0f4f8"/>

  <!-- Row 0: neutral -->
  <rect x="13" y="13" width="30" height="30" rx="2" fill="#ffffff"/>
  <rect x="49" y="13" width="30" height="30" rx="2" fill="#ffffff"/>
  <rect x="85" y="13" width="30" height="30" rx="2" fill="#ffffff"/>

  <!-- Row 1: add (green) -->
  <rect x="13" y="49" width="30" height="30" rx="2" fill="#22c55e"/>
  <rect x="49" y="49" width="30" height="30" rx="2" fill="#22c55e" opacity="0.35"/>
  <rect x="85" y="49" width="30" height="30" rx="2" fill="#22c55e" opacity="0.35"/>

  <!-- Row 2: delete (red) -->
  <rect x="13" y="85" width="30" height="30" rx="2" fill="#ef4444"/>
  <rect x="49" y="85" width="30" height="30" rx="2" fill="#ef4444" opacity="0.35"/>
  <rect x="85" y="85" width="30" height="30" rx="2" fill="#ef4444" opacity="0.35"/>

  <!-- Neutral row dots -->
  <rect x="19" y="25" width="18" height="6" rx="3" fill="#64748b" opacity="0.45"/>
  <rect x="55" y="25" width="18" height="6" rx="3" fill="#64748b" opacity="0.45"/>
  <rect x="91" y="25" width="18" height="6" rx="3" fill="#64748b" opacity="0.45"/>

  <!-- + indicator -->
  <text x="28" y="70" text-anchor="middle" font-size="17" font-weight="bold" fill="#dcfce7" font-family="monospace">+</text>

  <!-- − indicator -->
  <text x="28" y="106" text-anchor="middle" font-size="17" font-weight="bold" fill="#fee2e2" font-family="monospace">−</text>
</svg>
